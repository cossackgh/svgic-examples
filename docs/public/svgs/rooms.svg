<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <!-- Background layer -->
  <g id="background">
    <rect width="600" height="400" fill="#1a1a2e"/>
    <!-- Walls / corridors -->
    <rect x="20" y="20" width="560" height="360" rx="4" fill="none" stroke="#2d2d52" stroke-width="2"/>
    <line x1="220" y1="20" x2="220" y2="380" stroke="#2d2d52" stroke-width="2"/>
    <line x1="400" y1="20" x2="400" y2="380" stroke="#2d2d52" stroke-width="2"/>
    <line x1="20" y1="200" x2="600" y2="200" stroke="#2d2d52" stroke-width="2"/>
    <!-- Labels -->
    <text x="300" y="395" text-anchor="middle" fill="#555" font-size="11" font-family="sans-serif">Floor 1</text>
  </g>

  <!-- Rooms layer (interactive) -->
  <g id="rooms">
    <g id="room-101">
      <rect x="30" y="30" width="180" height="160" rx="2" fill="#2d2d52"/>
      <text x="120" y="105" text-anchor="middle" fill="#8888aa" font-size="13" font-family="sans-serif">101</text>
    </g>
    <g id="room-102">
      <rect x="230" y="30" width="160" height="160" rx="2" fill="#2d2d52"/>
      <text x="310" y="105" text-anchor="middle" fill="#8888aa" font-size="13" font-family="sans-serif">102</text>
    </g>
    <g id="room-103">
      <rect x="410" y="30" width="160" height="160" rx="2" fill="#2d2d52"/>
      <text x="490" y="105" text-anchor="middle" fill="#8888aa" font-size="13" font-family="sans-serif">103</text>
    </g>
    <g id="room-201">
      <rect x="30" y="210" width="180" height="160" rx="2" fill="#2d2d52"/>
      <text x="120" y="285" text-anchor="middle" fill="#8888aa" font-size="13" font-family="sans-serif">201</text>
    </g>
    <g id="room-202">
      <rect x="230" y="210" width="160" height="160" rx="2" fill="#2d2d52"/>
      <text x="310" y="285" text-anchor="middle" fill="#8888aa" font-size="13" font-family="sans-serif">202</text>
    </g>
    <g id="room-203">
      <rect x="410" y="210" width="160" height="160" rx="2" fill="#2d2d52"/>
      <text x="490" y="285" text-anchor="middle" fill="#8888aa" font-size="13" font-family="sans-serif">203</text>
    </g>
  </g>
</svg>
